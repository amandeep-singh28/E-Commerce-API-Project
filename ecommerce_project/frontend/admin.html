<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="glass-panel dashboard-panel">
        <div class="header">
            <h2>Admin Dashboard</h2>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <!-- PRODUCT -->
        <h3>Add Product</h3>

        <div class="grid-form">
            <div class="input-group">
                <label>Product Name</label>
                <input type="text" id="product-name" placeholder="Enter product name">
            </div>
            
            <div class="input-group">
                <label>Price</label>
                <input type="number" id="product-price" placeholder="Price">
            </div>
            
            <div class="input-group full-width">
                <label>Description</label>
                <input type="text" id="product-description" placeholder="Short description">
            </div>

            <div class="input-group">
                <label>Select Category:</label>
                <select id="product-category"></select>
            </div>

            <div class="input-group">
                <label>Or Add New Category:</label>
                <input type="text" id="new-category" placeholder="Type new category if not listed">
            </div>

            <div class="input-group full-width">
                <button onclick="addProduct()">Add Product</button>
            </div>
        </div>

        <hr>

        <!-- PRODUCT LIST -->
        <h3>Products Directory</h3>
        <ul id="product-list"></ul>
    </div>

    <script src="js/admin.js"></script>

    <script>
        function logout() {
            localStorage.removeItem("access");
            localStorage.removeItem("refresh");
            window.location.href = "login.html";
        }
    </script>

</body>

</html>
